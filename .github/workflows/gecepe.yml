name: Railway Automation

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        job_id: [1, 2, 3, 4, 5]

    env:
      JOB_COUNT: 5
      CURRENT_JOB: ${{ matrix.job_id }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies (Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Node Dependencies
        run: npm install

      - name: Install Playwright Browsers (Node)
        # Menambahkan --with-deps agar library bawaan Linux untuk Chromium ikut terinstal
        run: npx playwright install chromium --with-deps

      - name: Execute Lab Automation (Node All-in-One)
        # Menjalankan script Node yang baru menggunakan simulasi layar Xvfb
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" node gas-all-in-one.js

      - name: Upload Result Artifacts
        uses: actions/upload-artifact@v4
        if: always() # Tetap upload hasil meskipun terjadi error di tengah jalan
        with:
          # Nama artifact dibuat unik per job matrix agar tidak saling timpa
          name: bot-results-job-${{ matrix.job_id }}
          path: |
            akun.txt
            result.txt
            link.txt
          retention-days: 3

  # Job terpisah yang berjalan jika matrix 'run' selesai (baik sukses maupun ada yang gagal),
  # KECUALI jika workflow dibatalkan (cancelled) secara manual oleh user.
  trigger-next:
    needs: run
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Workflow Again
        env:
          # WAJIB: GITHUB_TOKEN bawaan akan memblokir trigger rekursif.
          # Buat PAT (Classic) dengan akses 'repo' dan 'workflow', simpan di Secrets sebagai PAT_TOKEN
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh workflow run "Railway Automation" --ref main
